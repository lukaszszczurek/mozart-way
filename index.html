    <!-- Host-based early override: swap favicon + title before React boots when on mastermode.ai -->
    <script>
      (function () {
        try {
          var h = location.hostname;
          if (/(^|\.)mastermode\.ai$/.test(h) || h.indexOf('mastermode-page') === 0) {
            document.title = 'Master Mode — aplikacja edukacyjna dla dzieci 3–7 lat';
            var link = document.querySelector('link[rel~="icon"]');
            if (!link) {
              link = document.createElement('link');
              link.rel = 'icon';
              document.head.appendChild(link);
            }
            link.type = 'image/png';
            link.href = '/mastermode/favicon-m.png';
          }
        } catch (e) {}
      })();
